<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morphy Tap-to-Earn | 11.8M Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap-btn:active { transform: scale(0.92); }
        .bg-gold-gradient { background: linear-gradient(145deg, #facc15, #ca8a04); }
    </style>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen font-sans">

    <div id="game-container" class="text-center p-10 border-4 border-yellow-600 rounded-3xl bg-gray-900 shadow-[0_0_50px_rgba(250,204,21,0.2)] max-w-sm w-full">
        <h1 class="text-5xl font-black mb-2 text-yellow-500 tracking-tighter">MORPHY</h1>
        <p class="text-xs uppercase tracking-widest text-yellow-600 mb-6 font-bold">High-Value Mining Node</p>
        
        <div class="bg-black/50 rounded-2xl p-4 mb-8 border border-white/10">
            <p class="text-gray-400 text-sm mb-1">Accumulated Reward</p>
            <div class="text-3xl font-mono font-bold text-green-400" id="reward-display">0 QUBIC</div>
            <div class="text-sm text-gray-500 mt-1" id="tap-count">0 / 10 TAPS</div>
        </div>

        <button onclick="handleTap()" id="main-btn" 
            class="tap-btn bg-gold-gradient text-black w-44 h-44 rounded-full text-4xl font-black shadow-[0_10px_0_0_#854d0e] hover:shadow-[0_5px_0_0_#854d0e] active:shadow-none transition-all mb-8 border-4 border-yellow-200">
            TAP
        </button>

        <button id="withdraw-btn" onclick="triggerWithdrawal()" disabled
            class="w-full bg-gray-800 text-gray-500 px-6 py-4 rounded-xl font-black uppercase tracking-widest cursor-not-allowed transition-all border-b-4 border-gray-900">
            Withdraw to DEX
        </button>
        
        <p class="mt-6 text-[10px] text-gray-600 uppercase">Connected to AWS Node: 3.139.60.228</p>
    </div>

    <script>
        let taps = 0;
        const target = 10;
        const QUBIC_PER_TAP = 11800000;
        
        // Enter your Qubic or USDT wallet address here
        const userAddress = "YOUR_WALLET_ADDRESS"; 
        const AWS_URL = "http://3.139.60.228:3000/mine-and-withdraw";

        function handleTap() {
            if (taps < target) {
                taps++;
                const totalReward = (taps * QUBIC_PER_TAP).toLocaleString();
                
                document.getElementById('tap-count').innerText = `${taps} / 10 TAPS`;
                document.getElementById('reward-display').innerText = `${totalReward} QUBIC`;
                
                if (taps === target) {
                    const btn = document.getElementById('withdraw-btn');
                    btn.disabled = false;
                    btn.classList.remove('bg-gray-800', 'text-gray-500', 'cursor-not-allowed', 'border-gray-900');
                    btn.classList.add('bg-green-500', 'text-black', 'hover:bg-green-400', 'border-green-700', 'shadow-lg');
                    btn.innerText = "CLAIM $90.00 SWAP";
                }
            }
        }

        async function triggerWithdrawal() {
            const btn = document.getElementById('withdraw-btn');
            const originalText = btn.innerText;
            btn.innerText = "HANDSHAKING...";
            btn.disabled = true;

            try {
                const res = await fetch(AWS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        tapsCompleted: taps, 
                        userWallet: userAddress 
                    })
                });

                const data = await res.json();

                if (data.success) {
                    alert(`🚀 TRANSACTION SUCCESS!\n\nMined: ${data.reward.toLocaleString()} QUBIC\nSwap ID: ${data.dex.id}\n\nCheck your AWS terminal for the Pay-in address!`);
                    taps = 0;
                    document.getElementById('tap-count').innerText = "0 / 10 TAPS";
                    document.getElementById('reward-display').innerText = "0 QUBIC";
                } else {
                    alert("❌ DEX ERROR: " + (data.error || "Check AWS Logs"));
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            } catch (err) {
                console.error(err);
                alert("📡 NODE UNREACHABLE\n\n1. Ensure 'node morphy-server.js' is running on AWS.\n2. Enable 'Insecure Content' in your browser settings.");
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }
    </script>
</body>
</html>
