<!DOCTYPE html>
<html>
<head>
    <title>Morphy Tap Portal</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        #tapCircle { width: 200px; height: 200px; background: gold; border-radius: 50%; margin: 50px auto; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }
        .hidden { display: none; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Morphy Tap Portal</h1>
    
    <div id="walletSection">
        <button id="connectBtn" onclick="connect()">Connect Wallet</button>
        <button id="logoutBtn" class="hidden" onclick="logout()">Logout</button>
        <p id="walletAddr"></p>
    </div>

    <div id="gameSection" class="hidden">
        <div id="tapCircle" onclick="handleTap()">TAP HERE</div>
        <p id="tapCount">TAPS REMAINING: 10</p>
        <button id="withdrawBtn" class="hidden" onclick="triggerWithdrawal()">Withdraw to DEX</button>
    </div>

    <script>
        let taps = 10;
        let userAddress = "";

        async function connect() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];
                document.getElementById('walletAddr').innerText = "Connected: " + userAddress;
                document.getElementById('connectBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('gameSection').classList.remove('hidden');
            }
        }

        function logout() {
            userAddress = "";
            document.getElementById('walletAddr').innerText = "";
            document.getElementById('connectBtn').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('gameSection').classList.add('hidden');
        }

        function handleTap() {
            if (taps > 0) {
                taps--;
                document.getElementById('tapCount').innerText = "TAPS REMAINING: " + taps;
                if (taps === 0) {
                    document.getElementById('withdrawBtn').classList.remove('hidden');
                }
            }
        }

        async function triggerWithdrawal() {
            const res = await fetch('http://3.139.60.228:3000/withdraw', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: 1000000, userWallet: userAddress })
            });
            const data = await res.json();
            if (data.success) {
                alert("Withdrawal Initialized! Hash: " + data.data.id);
            } else {
                alert("Error: " + data.error);
            }
        }
    </script>
</body>
</html>
